<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cyan: #00d4ff;
      --blue: #0066ff;
      --glow: rgba(0, 212, 255, 0.4);
      --dark: rgba(0, 8, 20, 0.92);
      --panel: rgba(0, 20, 50, 0.85);
      --border: rgba(0, 212, 255, 0.3);
      --text: #e0f8ff;
      --dim: rgba(0, 212, 255, 0.6);
    }

    body {
      background: transparent;
      font-family: 'Share Tech Mono', monospace;
      color: var(--text);
      overflow: hidden;
      user-select: none;
    }

    #root {
      width: 420px;
      height: 700px;
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 40px var(--glow), inset 0 0 60px rgba(0,0,30,0.8);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Corner decorations */
    #root::before, #root::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--cyan);
      border-style: solid;
      z-index: 100;
    }
    #root::before { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
    #root::after { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

    /* ── Header ─────────────────────────────────────────────────── */
    .hud-header {
      padding: 12px 16px 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag;
    }

    .hud-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--cyan);
      text-shadow: 0 0 20px var(--cyan);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00ff88;
      box-shadow: 0 0 8px #00ff88;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .close-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      width: 24px;
      height: 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .close-btn:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,212,255,0.1); }

    /* ── Stats Bar ───────────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      padding: 6px 16px;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      color: var(--dim);
    }
    .stat { display: flex; align-items: center; gap: 4px; }
    .stat-val { color: var(--cyan); }

    /* ── Chat Log ────────────────────────────────────────────────── */
    .chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .chat-log::-webkit-scrollbar { width: 4px; }
    .chat-log::-webkit-scrollbar-track { background: transparent; }
    .chat-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      background: rgba(0, 100, 255, 0.2);
      border: 1px solid rgba(0, 100, 255, 0.4);
      color: #aad4ff;
    }

    .msg.jarvis {
      align-self: flex-start;
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .msg.jarvis .sender {
      color: var(--cyan);
      font-size: 10px;
      letter-spacing: 2px;
      margin-bottom: 4px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
    }

    .msg.action-tag {
      align-self: flex-start;
      background: rgba(0, 255, 100, 0.06);
      border: 1px solid rgba(0, 255, 100, 0.2);
      color: rgba(0, 255, 100, 0.8);
      font-size: 10px;
      padding: 4px 10px;
    }

    /* ── Scanning Line ────────────────────────────────────────────── */
    .scan-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      animation: scan 3s linear infinite;
      opacity: 0.4;
    }

    @keyframes scan {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* ── Input Area ──────────────────────────────────────────────── */
    .input-area {
      padding: 10px 14px 14px;
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      background: rgba(0, 212, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,212,255,0.2); }
    .chat-input::placeholder { color: var(--dim); opacity: 0.5; }

    .btn {
      padding: 8px 14px;
      border-radius: 6px;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-send {
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      color: #000;
    }
    .btn-send:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--glow); }

    .btn-voice {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
      width: 36px;
      height: 36px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .btn-voice:hover { border-color: var(--cyan); color: var(--cyan); }
    .btn-voice.listening {
      border-color: #ff4466;
      color: #ff4466;
      box-shadow: 0 0 12px rgba(255,68,102,0.4);
      animation: voicePulse 1s ease-in-out infinite;
    }

    @keyframes voicePulse {
      0%, 100% { box-shadow: 0 0 8px rgba(255,68,102,0.4); }
      50% { box-shadow: 0 0 20px rgba(255,68,102,0.7); }
    }

    /* ── Quick Actions ───────────────────────────────────────────── */
    .quick-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .quick-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .quick-btn:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,212,255,0.05); }

    /* ── Time display ─────────────────────────────────────────────── */
    .hud-clock {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 2px;
    }

    /* ── Typing indicator ─────────────────────────────────────────── */
    .typing {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid var(--border);
    }
    .typing span {
      width: 5px;
      height: 5px;
      background: var(--cyan);
      border-radius: 50%;
      animation: typingDot 1.4s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingDot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="root">
    <!-- Header -->
    <div class="hud-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="status-dot"></div>
        <div class="hud-title">JARVIS</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="hud-clock" id="clock">00:00:00</div>
        <button class="close-btn" onclick="window.close()">✕</button>
      </div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat">CPU <span class="stat-val" id="cpu">--</span>%</div>
      <div class="stat">RAM <span class="stat-val" id="ram">--</span>%</div>
      <div class="stat">STATUS <span class="stat-val">ONLINE</span></div>
      <div class="stat">AI <span class="stat-val">CLAUDE</span></div>
    </div>

    <!-- Chat Log -->
    <div class="chat-log" id="chatLog">
      <div class="msg jarvis">
        <div class="sender">JARVIS</div>
        All systems online. How can I assist you today, sir?
      </div>
    </div>

    <!-- Scanning line -->
    <div class="scan-line"></div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-row">
        <button class="btn btn-voice" id="voiceBtn" onclick="toggleVoice()" title="Voice command">🎤</button>
        <input
          class="chat-input"
          id="chatInput"
          type="text"
          placeholder="Give a command..."
          autocomplete="off"
          onkeydown="if(event.key==='Enter') sendMessage()"
        />
        <button class="btn btn-send" onclick="sendMessage()">SEND</button>
      </div>
      <div class="quick-actions">
        <button class="quick-btn" onclick="quickCmd('Open OBS and start stream')">▶ STREAM</button>
        <button class="quick-btn" onclick="quickCmd('Open Steam')">🎮 STEAM</button>
        <button class="quick-btn" onclick="quickCmd('Latest gaming news')">📰 NEWS</button>
        <button class="quick-btn" onclick="quickCmd('Check my Twitch channel')">📺 TWITCH</button>
        <button class="quick-btn" onclick="quickCmd('Set volume to 50%')">🔊 VOL</button>
        <button class="quick-btn" onclick="quickCmd('Good morning briefing')">🌅 A.M.</button>
      </div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:5000';
    let isListening = false;

    // ── Clock ──────────────────────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('en-US', { hour12: false });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── Fake system stats (replace with real API call) ─────────────────────
    function updateStats() {
      document.getElementById('cpu').textContent = Math.floor(Math.random() * 30 + 5);
      document.getElementById('ram').textContent = Math.floor(Math.random() * 20 + 50);
    }
    setInterval(updateStats, 3000);

    // ── Chat ───────────────────────────────────────────────────────────────
    function addMessage(text, role, action) {
      const log = document.getElementById('chatLog');

      // Remove typing indicator
      const typing = log.querySelector('.typing');
      if (typing) typing.remove();

      const msg = document.createElement('div');
      msg.className = `msg ${role}`;

      if (role === 'jarvis') {
        msg.innerHTML = `<div class="sender">JARVIS</div>${escapeHtml(text)}`;
      } else {
        msg.textContent = text;
      }

      log.appendChild(msg);

      if (action && action.action) {
        const tag = document.createElement('div');
        tag.className = 'msg action-tag';
        tag.textContent = `⚡ ${action.action.toUpperCase().replace(/_/g,' ')}`;
        log.appendChild(tag);
      }

      log.scrollTop = log.scrollHeight;
    }

    function showTyping() {
      const log = document.getElementById('chatLog');
      const t = document.createElement('div');
      t.className = 'typing';
      t.innerHTML = '<span></span><span></span><span></span>';
      log.appendChild(t);
      log.scrollTop = log.scrollHeight;
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (!message) return;

      input.value = '';
      addMessage(message, 'user');
      showTyping();

      try {
        const res = await fetch(`${API}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        const data = await res.json();
        addMessage(data.reply || 'Done.', 'jarvis', data.action);
      } catch (err) {
        addMessage('Backend offline. Start server.py first.', 'jarvis');
      }
    }

    function quickCmd(cmd) {
      document.getElementById('chatInput').value = cmd;
      sendMessage();
    }

    // ── Voice ──────────────────────────────────────────────────────────────
    async function toggleVoice() {
      const btn = document.getElementById('voiceBtn');

      if (isListening) {
        isListening = false;
        btn.classList.remove('listening');
        btn.textContent = '🎤';
        await fetch(`${API}/voice/stop`, { method: 'POST' });
        return;
      }

      isListening = true;
      btn.classList.add('listening');
      btn.textContent = '🔴';
      addMessage('Listening...', 'jarvis');

      try {
        const res = await fetch(`${API}/voice/start`, { method: 'POST' });
        // Response comes via WebSocket
        setTimeout(() => {
          if (isListening) {
            isListening = false;
            btn.classList.remove('listening');
            btn.textContent = '🎤';
          }
        }, 10000);
      } catch (err) {
        isListening = false;
        btn.classList.remove('listening');
        btn.textContent = '🎤';
        addMessage('Voice unavailable. Backend offline.', 'jarvis');
      }
    }
  </script>
</body>
</html>
